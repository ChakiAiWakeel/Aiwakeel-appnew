<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AiWakeel · Premium Dashboard</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.21.1/pocketbase.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #E5C77E;
            --obsidian: #050505;
            --surface: #0F0F0F;
            --surface2: #161616;
            --text: #F0EDE8;
            --text-muted: rgba(240, 237, 232, 0.4);
            --border: rgba(201, 168, 76, 0.12);
            --border-bright: rgba(201, 168, 76, 0.3);
            --glow: rgba(201, 168, 76, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--obsidian);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Ambient Background Glow */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 50%;
            width: 140vw; height: 100vh;
            background: radial-gradient(circle at 50% -10%, var(--glow) 0%, transparent 60%);
            transform: translateX(-50%);
            pointer-events: none;
            z-index: 0;
        }

        .header {
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0; z-index: 100;
            background: rgba(5, 5, 5, 0.8);
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            color: var(--gold);
            letter-spacing: 1.5px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .logout-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 14px;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:active { border-color: var(--gold); color: var(--gold); }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 32px 20px;
            position: relative;
            z-index: 1;
        }

        .greeting { margin-bottom: 32px; }
        .greeting h1 { font-family: 'Cormorant Garamond', serif; font-size: 34px; font-weight: 400; margin-bottom: 4px; }
        .greeting p { color: var(--text-muted); font-size: 13px; letter-spacing: 0.3px; }

        /* Card Design */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .status-badge {
            font-size: 9px;
            text-transform: uppercase;
            padding: 4px 12px;
            border: 1px solid var(--gold);
            color: var(--gold);
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* Toggle Row */
        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .toggle-label span { display: block; font-size: 14px; font-weight: 400; color: var(--text); }
        .toggle-label small { color: var(--text-muted); font-size: 11px; }

        /* Custom Switch */
        .switch {
            width: 48px; height: 26px;
            background: #1a1a1a;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .switch.active { background: var(--gold); border-color: var(--gold); }
        .switch-circle {
            position: absolute;
            top: 3px; left: 3px;
            width: 18px; height: 18px;
            background: white;
            border-radius: 50%;
            transition: 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .switch.active .switch-circle { transform: translateX(22px); }

        /* Metrics Grid */
        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 24px;
        }
        .metric-box {
            background: var(--surface2);
            padding: 20px 16px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .metric-val {
            display: block;
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 8px;
        }
        .metric-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.2px; }

        /* Chart Area */
        .chart-container {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 16px 10px 10px 10px;
            margin-top: 16px;
        }
        .chart-title {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-left: 10px;
            margin-bottom: 15px;
        }

        #toast {
            position: fixed;
            bottom: 40px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--surface);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 14px 28px;
            font-size: 12px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            letter-spacing: 0.5px;
        }
        #toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div id="toast">Benachrichtigung</div>

<header class="header">
    <div class="logo">AiWakeel</div>
    <button class="logout-btn" onclick="logout()">Abmelden</button>
</header>

<div class="container">
    <div class="greeting">
        <h1 id="user-name">Guten Tag</h1>
        <p>Systemstatus: Optimal & Wachsam</p>
    </div>

    <div class="card">
        <div class="card-header">
            <h2 style="font-family:'Cormorant Garamond'; font-size:24px; font-weight: 400;">KI Agent</h2>
            <div id="status-text" class="status-badge">Aktiv</div>
        </div>

        <div class="toggle-row">
            <div class="toggle-label">
                <span>Optimierung</span>
                <small>KI-Automatisierung steuern</small>
            </div>
            <div id="agent-toggle" class="switch" onclick="toggleAgent()">
                <div class="switch-circle"></div>
            </div>
        </div>

        <div class="metrics">
            <div class="metric-box">
                <span id="clicks-val" class="metric-val">0</span>
                <span class="metric-label">Klicks</span>
            </div>
            <div class="metric-box">
                <span id="pos-val" class="metric-val">0.0</span>
                <span class="metric-label">Ø Position</span>
            </div>
        </div>
    </div>

    <div class="chart-container">
        <div class="chart-title">Performance 30 Tage</div>
        <div id="chart"></div>
    </div>
</div>

<script>
    const pb = new PocketBase('https://ads.aiwakeel.ai');
    let chart = null;

    // Login-Schutz
    if (!pb.authStore.isValid) window.location.href = 'login.html';

    const user = pb.authStore.model;

    window.onload = async () => {
        // UI Initialisierung
        const firstName = user.name ? user.name.split(' ')[0] : 'Elite User';
        document.getElementById('user-name').textContent = `Guten Tag, ${firstName}`;
        
        updateUI(user.agent_status === 'aktiv');
        
        // Daten aus PocketBase laden
        await loadDashboardData();
    };

    async function loadDashboardData() {
        try {
            // Holt die letzten 30 Berichte aus der daily_reports Collection
            const records = await pb.collection('daily_reports').getList(1, 30, {
                filter: `user = "${user.id}"`,
                sort: '-created'
            });

            if (records.items.length > 0) {
                const latest = records.items[0];
                
                // Update Kacheln
                animateValue("clicks-val", 0, latest.clicks, 1000);
                document.getElementById('pos-val').textContent = latest.position.toFixed(1);
                
                // Chart rendern (reverse, damit die Zeit von links nach rechts läuft)
                renderChart(records.items.reverse());
            }
        } catch (e) {
            console.error("Datenfehler:", e);
        }
    }

    function renderChart(data) {
        const options = {
            series: [{
                name: 'Impressionen',
                data: data.map(r => r.impressions)
            }],
            chart: {
                type: 'area',
                height: 180,
                toolbar: { show: false },
                sparkline: { enabled: false },
                background: 'transparent'
            },
            colors: ['#C9A84C'],
            stroke: { curve: 'smooth', width: 2 },
            fill: {
                type: 'gradient',
                gradient: { shadeIntensity: 1, opacityFrom: 0.4, opacityTo: 0.05 }
            },
            grid: { show: false },
            xaxis: {
                categories: data.map(r => new Date(r.created).toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit'})),
                axisBorder: { show: false },
                axisTicks: { show: false },
                labels: { show: true, style: { colors: '#444', fontSize: '9px' } }
            },
            yaxis: { show: false },
            dataLabels: { enabled: false },
            tooltip: { 
                theme: 'dark',
                x: { show: false },
                marker: { show: true }
            }
        };

        if(chart) chart.destroy();
        chart = new ApexCharts(document.querySelector("#chart"), options);
        chart.render();
    }

    async function toggleAgent() {
        const isCurrentlyActive = document.getElementById('agent-toggle').classList.contains('active');
        const nextStatus = !isCurrentlyActive;
        const statusString = nextStatus ? 'aktiv' : 'inaktiv';

        try {
            // Update in PocketBase
            await pb.collection('users').update(user.id, { agent_status: statusString });
            
            updateUI(nextStatus);
            showToast(nextStatus ? "✦ Agent aktiviert" : "Agent pausiert");
        } catch (e) {
            showToast("Fehler bei Synchronisierung");
        }
    }

    function updateUI(isActive) {
        const toggle = document.getElementById('agent-toggle');
        const statusText = document.getElementById('status-text');
        
        if(isActive) {
            toggle.classList.add('active');
            statusText.textContent = "Aktiv";
            statusText.style.borderColor = "var(--gold)";
            statusText.style.color = "var(--gold)";
        } else {
            toggle.classList.remove('active');
            statusText.textContent = "Pausiert";
            statusText.style.borderColor = "var(--text-muted)";
            statusText.style.color = "var(--text-muted)";
        }
    }

    function animateValue(id, start, end, duration) {
        const obj = document.getElementById(id);
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            obj.innerHTML = Math.floor(progress * (end - start) + start);
            if (progress < 1) { window.requestAnimationFrame(step); }
        };
        window.requestAnimationFrame(step);
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => { t.classList.remove('show'); }, 3000);
    }

    function logout() {
        pb.authStore.clear();
        window.location.href = 'login.html';
    }
</script>

</body>
</html>
