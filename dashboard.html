<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AiWakeel · Kunden Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.21.1/pocketbase.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ... (Hier bleibt dein gesamtes CSS aus der aiwakeel-dashboard.html exakt gleich) ... */
:root{ --gold:#C9A84C; --gold-dim:rgba(201,168,76,0.1); --obsidian:#080808; --surface:#0F0F0F; --surface2:#161616; --text:#F0EDE8; --text-muted:rgba(240,237,232,0.42); --green:#4CAF50; --red:#E05252; --border:rgba(201,168,76,0.18); --border2:rgba(201,168,76,0.08); }
body{background:var(--obsidian);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 40% at 50% -5%,rgba(201,168,76,0.06) 0%,transparent 60%);pointer-events:none;z-index:0}
/* ... (restliches Styling wie im Original-Template) ... */
.dash-header{background:var(--surface);border-bottom:1px solid var(--border2);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.dash-logo{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold)}
.dash-logout{font-size:10px;text-transform:uppercase;cursor:pointer;border:1px solid var(--border2);padding:5px 10px;color:var(--text-muted);background:none;}
.dash-content{padding:24px 16px 60px;max-width:500px;margin:0 auto}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.metric-cell{background:var(--surface2);border:1px solid var(--border2);padding:14px;}
.metric-num{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--gold);}
.toggle-switch{width:52px;height:28px;background:var(--surface3);border-radius:14px;position:relative;cursor:pointer;transition:background 0.3s;border:1px solid var(--border2)}
.toggle-switch.on{background:var(--gold)}
.toggle-knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform 0.3s;}
.toggle-switch.on .toggle-knob{transform:translateX(24px)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);padding:12px 20px;font-size:12px;color:var(--gold);z-index:9999;opacity:0;transition:all 0.3s;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.21.1/pocketbase.umd.js"></script>
<script>
  // PocketBase direkt ganz oben laden
  const pb = new PocketBase('https://ads.aiwakeel.ai');

  // ── SICHERHEITS-CHECK ──
  // Wir fragen PocketBase direkt, ob der User noch eingeloggt ist!
  if (!pb.authStore.isValid) {
    window.location.href = "login.html";
  }
</script>
</head>
<body>

<div id="toast"></div>

<div id="dashboard-screen" style="display:block;">
  <div class="dash-header">
    <div class="dash-logo">AiWakeel</div>
    <div class="dash-header-right" style="display:flex; align-items:center; gap:14px;">
      <div id="dash-user-name" style="font-size:11px; color:var(--text-muted);">Lade...</div>
      <button class="dash-logout" onclick="doLogout()">Abmelden</button>
    </div>
  </div>

  <div class="dash-content">
    <div class="greeting" style="margin-bottom:24px;">
      <div id="greeting-title" style="font-family:'Cormorant Garamond'; font-size:26px;">Guten Tag</div>
      <div class="greeting-sub" style="font-size:12px; color:var(--text-muted);">Dein Agent ist bereit zur Optimierung.</div>
    </div>

    <div class="agent-card" style="background:var(--surface); border:1px solid var(--border); padding:24px; margin-bottom:16px;">
      <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
        <div class="agent-card-title" style="font-family:'Cormorant Garamond'; font-size:20px;">Ads Agent</div>
        <div id="agent-status-pill" class="status-active" style="font-size:10px; border:1px solid var(--gold); padding:4px 10px;">Aktiv</div>
      </div>

      <div class="agent-toggle-row" style="display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-top:1px solid var(--border2);">
        <div>
          <div style="font-size:13px;">Agent pausieren</div>
          <div style="font-size:11px; color:var(--text-muted);">Schalte ihn aus, um Gebote zu stoppen</div>
        </div>
        <div class="toggle-switch on" id="main-toggle" onclick="handleToggle()">
          <div class="toggle-knob"></div>
        </div>
      </div>

      <div class="metrics-grid">
        <div class="metric-cell"><span class="metric-num">284</span><div style="font-size:10px; color:var(--text-muted);">Klicks heute</div></div>
        <div class="metric-cell"><span class="metric-num">1.24€</span><div style="font-size:10px; color:var(--text-muted);">Ø CPC</div></div>
      </div>
    </div>
    
    </div>
</div>

<script>
const pb = new PocketBase('https://ads.aiwakeel.ai');
const userData = JSON.parse(localStorage.getItem('aw_session'));
const N8N_TOGGLE = 'https://n8n.aiwakeel.ai/webhook/agent-toggle';

let agentOn = true;

window.onload = () => {
    if(userData) {
        const name = userData.record.email.split('@')[0].toUpperCase();
        document.getElementById('dash-user-name').textContent = name;
        document.getElementById('greeting-title').textContent = "Willkommen zurück, " + name;
    }
};

function handleToggle() {
    agentOn = !agentOn;
    const toggle = document.getElementById('main-toggle');
    toggle.classList.toggle('on', agentOn);
    
    toast(agentOn ? "✦ Agent aktiviert" : "Agent pausiert");

    // Signal an n8n senden, um Google Ads wirklich zu stoppen/starten
    fetch(N8N_TOGGLE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: agentOn ? 'active' : 'paused', user: userData.record.email })
    }).catch(e => console.error("Webhook Fehler"));
}

function doLogout() {
    localStorage.removeItem('aw_session');
    window.location.href = "login.html";
}

function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
