<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AiWakeel · Elite Dashboard</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.21.1/pocketbase.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #C9A84C;
            --obsidian: #050505;
            --surface: #0F0F0F;
            --surface2: #161616;
            --text: #F0EDE8;
            --text-muted: rgba(240, 237, 232, 0.4);
            --border: rgba(201, 168, 76, 0.12);
            --glow: rgba(201, 168, 76, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--obsidian);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 50%;
            width: 140vw; height: 100vh;
            background: radial-gradient(circle at 50% -10%, var(--glow) 0%, transparent 60%);
            transform: translateX(-50%);
            pointer-events: none;
            z-index: 0;
        }

        .header {
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0; z-index: 100;
            background: rgba(5, 5, 5, 0.8);
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            color: var(--gold);
            letter-spacing: 1.5px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .logout-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 14px;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            cursor: pointer;
        }

        .main-content {
            flex: 1;
            max-width: 500px;
            margin: 0 auto;
            padding: 32px 20px;
            position: relative;
            z-index: 1;
            width: 100%;
        }

        .greeting { margin-bottom: 32px; }
        .greeting h1 { font-family: 'Cormorant Garamond', serif; font-size: 34px; font-weight: 400; }
        .greeting p { color: var(--text-muted); font-size: 13px; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 24px;
            margin-bottom: 16px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .status-badge {
            font-size: 9px;
            text-transform: uppercase;
            padding: 4px 12px;
            border: 1px solid var(--gold);
            color: var(--gold);
            letter-spacing: 1px;
        }

        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-top: 1px solid var(--border);
        }

        .switch {
            width: 48px; height: 26px;
            background: #1a1a1a;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: 0.4s;
        }
        .switch.active { background: var(--gold); border-color: var(--gold); }
        .switch-circle {
            position: absolute;
            top: 3px; left: 3px;
            width: 18px; height: 18px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        .switch.active .switch-circle { transform: translateX(22px); }

        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 24px;
        }
        .metric-box {
            background: var(--surface2);
            padding: 20px 16px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .metric-val {
            display: block;
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            color: var(--gold);
        }
        .metric-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        /* Budget Section */
        .budget-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        .budget-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.3s;
        }
        .budget-btn:hover { border-color: var(--gold); }

        .chart-container {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 16px 10px;
            margin-top: 16px;
        }

        /* Luxury Footer */
        footer {
            padding: 60px 20px;
            border-top: 1px solid var(--border);
            text-align: center;
            background: var(--obsidian);
            position: relative;
            z-index: 1;
        }
        .footer-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            color: var(--gold);
            margin-bottom: 10px;
            display: block;
        }
        .footer-text { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }

        #toast {
            position: fixed;
            bottom: 40px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--surface);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 14px 28px;
            font-size: 12px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.4s;
            backdrop-filter: blur(10px);
        }
        #toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div id="toast">Benachrichtigung</div>

<header class="header">
    <div class="logo">AiWakeel</div>
    <button class="logout-btn" onclick="logout()">Abmelden</button>
</header>

<div class="main-content">
    <div class="greeting">
        <h1 id="user-name">Guten Tag</h1>
        <p>Systemstatus: Aktiv & Überwacht</p>
    </div>

    <div class="card">
        <div class="card-header">
            <h2 style="font-family:'Cormorant Garamond'; font-size:24px; font-weight: 400;">KI Agent</h2>
            <div id="status-text" class="status-badge">Lädt...</div>
        </div>

        <div class="toggle-row">
            <div class="toggle-label">
                <span style="font-size:14px;">KI-Optimierung</span>
                <small style="color:var(--text-muted); font-size:11px;">Agent Status steuern</small>
            </div>
            <div id="agent-toggle" class="switch" onclick="toggleAgent()">
                <div class="switch-circle"></div>
            </div>
        </div>

        <div class="metrics">
            <div class="metric-box">
                <span id="clicks-val" class="metric-val">0</span>
                <span class="metric-label">Klicks</span>
            </div>
            <div class="metric-box">
                <span id="pos-val" class="metric-val">0.0</span>
                <span class="metric-label">Ø Position</span>
            </div>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="font-family:'Cormorant Garamond'; font-size:24px; font-weight: 400;">Budget-Plan</h2>
            <div id="current-budget-display" style="font-family:'Cormorant Garamond'; color:var(--gold); font-size: 24px;">0€</div>
        </div>
        <div style="border-top: 1px solid var(--border); padding-top: 20px;">
            <p style="font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Anpassen</p>
            <div class="budget-grid">
                <button class="budget-btn" onclick="updateBudget(500)">500€</button>
                <button class="budget-btn" onclick="updateBudget(1000)">1000€</button>
                <button class="budget-btn" onclick="updateBudget(2500)">2500€</button>
            </div>
        </div>
    </div>

    <div class="chart-container">
        <div style="font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin: 0 0 15px 10px;">Performance (30 Tage)</div>
        <div id="chart"></div>
    </div>
</div>

<footer>
    <span class="footer-logo">AiWakeel</span>
    <p class="footer-text">© 2024 Design for Success · Elite Marketing Intelligence</p>
</footer>

<script>
    const pb = new PocketBase('https://ads.aiwakeel.ai');
    let chart = null;

    if (!pb.authStore.isValid) window.location.href = 'login.html';
    const user = pb.authStore.model;

    window.onload = async () => {
        const firstName = user.name ? user.name.split(' ')[0] : 'Elite User';
        document.getElementById('user-name').textContent = `Guten Tag, ${firstName}`;
        
        // Initialer UI Status
        updateUI(user.agent_status === 'aktiv');
        document.getElementById('current-budget-display').textContent = `${user.budget || 0}€`;
        
        await loadDashboardData();
    };

    async function loadDashboardData() {
        try {
            const records = await pb.collection('daily_reports').getList(1, 30, {
                filter: `user = "${user.id}"`,
                sort: '-created'
            });

            if (records.items.length > 0) {
                const latest = records.items[0];
                document.getElementById('clicks-val').textContent = latest.clicks;
                document.getElementById('pos-val').textContent = latest.position.toFixed(1);
                renderChart(records.items.reverse());
            }
        } catch (e) { console.error("Fehler:", e); }
    }

    function renderChart(data) {
        const options = {
            series: [{ name: 'Impressionen', data: data.map(r => r.impressions) }],
            chart: { type: 'area', height: 180, toolbar: { show: false }, background: 'transparent' },
            colors: ['#C9A84C'],
            stroke: { curve: 'smooth', width: 2 },
            fill: { type: 'gradient', gradient: { shadeIntensity: 1, opacityFrom: 0.4, opacityTo: 0 } },
            grid: { show: false },
            xaxis: {
                categories: data.map(r => new Date(r.created).toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit'})),
                labels: { style: { colors: '#444', fontSize: '9px' } }
            },
            yaxis: { show: false },
            dataLabels: { enabled: false },
            tooltip: { theme: 'dark' }
        };
        if(chart) chart.destroy();
        chart = new ApexCharts(document.querySelector("#chart"), options);
        chart.render();
    }

    async function toggleAgent() {
        const isCurrentlyActive = document.getElementById('agent-toggle').classList.contains('active');
        const nextStatus = !isCurrentlyActive;
        const statusString = nextStatus ? 'aktiv' : 'inaktiv';

        try {
            await pb.collection('users').update(user.id, { "agent_status": statusString });
            updateUI(nextStatus);
            showToast(nextStatus ? "✦ Agent aktiviert" : "Agent pausiert");
        } catch (e) { showToast("Fehler beim Speichern"); }
    }

    async function updateBudget(newAmount) {
        try {
            await pb.collection('users').update(user.id, { "budget": newAmount });
            document.getElementById('current-budget-display').textContent = `${newAmount}€`;
            showToast(`✦ Budget auf ${newAmount}€ gesetzt`);
        } catch (e) { showToast("Fehler"); }
    }

    function updateUI(isActive) {
        const toggle = document.getElementById('agent-toggle');
        const statusText = document.getElementById('status-text');
        toggle.classList.toggle('active', isActive);
        statusText.textContent = isActive ? "Aktiv" : "Pausiert";
        statusText.style.color = isActive ? "var(--gold)" : "var(--text-muted)";
        statusText.style.borderColor = isActive ? "var(--gold)" : "var(--text-muted)";
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => { t.classList.remove('show'); }, 3000);
    }

    function logout() {
        pb.authStore.clear();
        window.location.href = 'login.html';
    }
</script>

</body>
</html>
