<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AiWakeel Setup</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.21.1/pocketbase.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#C9A84C; --obsidian:#080808; --surface:#0F0F0F;
  --text:#F0EDE8; --text-muted:rgba(240,237,232,0.42);
}

/* Verhindert das Wischen nach rechts/links auf dem Handy */
html, body {
  width: 100%;
  overflow-x: hidden; 
  position: relative;
  margin: 0; padding: 0;
  background: var(--obsidian);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; }

/* Zentrierter Wrapper, der niemals breiter als das Handy ist */
.wrapper {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 100vw;
  padding: 20px 15px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Card-Design Anpassung für Mobile */
.card {
  background: var(--surface);
  border: 1px solid rgba(201,168,76,0.18);
  width: 100%;
  max-width: 440px;
  padding: 30px 20px;
  box-shadow: 0 40px 100px rgba(0,0,0,0.8);
  position: relative;
}

/* Buttons skalieren jetzt sauber */
.connect-btn {
  width: 100%;
  padding: 16px;
  background: #161616;
  border: 1px solid rgba(201,168,76,0.15);
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  cursor: pointer;
}

.connect-btn.connected { border-color: var(--gold); background: rgba(201,168,76,0.05); }

.logo-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  letter-spacing: 0.15em;
  color: var(--gold);
  text-align: center;
  margin-bottom: 30px;
}

/* Footer Fix */
.footer {
  width: 100%;
  text-align: center;
  padding: 40px 0;
  border-top: 1px solid rgba(201,168,76,0.1);
  font-size: 10px;
}

.step-panel { display: none; }
.step-panel.active { display: block; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Restliches CSS (Testimonials etc.) wurde hier für die Übersichtlichkeit gekürzt, 
   aber die Breiten wurden auf 100% fixiert */
.testi-track {
  display: flex;
  overflow-x: auto;
  width: 100%;
  scroll-snap-type: x mandatory;
}
.testi-card {
  min-width: 100%; /* Verhindert Überlappen */
  scroll-snap-align: start;
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="logo-text">AiWakeel</div>

  <div class="card">
    <div id="step-1" class="step-panel active">
      <h2 style="font-family:'Cormorant Garamond'; font-weight:300;">Verbinden</h2>
      <p style="font-size:13px; color:var(--text-muted); margin-bottom:25px;">Aktiviere deinen Ads Agent via Google.</p>
      
      <button class="connect-btn" id="btn-gsc" onclick="connectGoogle('gsc')">
        <span>🔍</span>
        <div style="flex:1; text-align:left;">
            <div style="font-size:13px;">Google Search Console</div>
            <div style="font-size:10px; color:var(--text-muted);">Keywords analysieren</div>
        </div>
        <span id="status-gsc" style="color:var(--gold); font-size:11px;">Connect →</span>
      </button>

      <button class="connect-btn" id="btn-gads" onclick="connectGoogle('gads')" disabled>
        <span>📢</span>
        <div style="flex:1; text-align:left;">
            <div style="font-size:13px;">Google Ads</div>
            <div style="font-size:10px; color:var(--text-muted);">Kampagnen buchen</div>
        </div>
        <span id="status-gads" style="color:rgba(240,237,232,0.2); font-size:11px;">Connect →</span>
      </button>
      
      <button id="btn-next" style="width:100%; padding:15px; background:var(--gold); border:none; margin-top:10px; font-weight:600;" disabled onclick="alert('Nächster Schritt')">Weiter</button>
    </div>
  </div>

  <footer class="footer">
    <div style="margin-bottom:10px;">
        <a href="#" style="color:var(--text-muted); text-decoration:none; margin:0 10px;">AGB</a>
        <a href="#" style="color:var(--text-muted); text-decoration:none; margin:0 10px;">Datenschutz</a>
    </div>
    © 2026 AIWAKEEL
  </footer>
</div>

<script>
const pb = new PocketBase('https://ads.aiwakeel.ai');
let gscDone = false, gadsDone = false;

async function connectGoogle(type) {
  pb.authStore.clear();
  try {
    const authData = await pb.collection('users').authWithOAuth2({ provider: 'google' });
    if (pb.authStore.isValid) {
      document.getElementById('btn-' + type).classList.add('connected');
      document.getElementById('status-' + type).textContent = '✓';
      
      if(type === 'gsc') {
        gscDone = true;
        document.getElementById('btn-gads').disabled = false;
        document.getElementById('status-gads').style.color = '#C9A84C';
      } else {
        gadsDone = true;
      }
      
      if(gscDone && gadsDone) document.getElementById('btn-next').disabled = false;
    }
  } catch (err) {
    console.error("Fehler:", err);
  }
}
</script>
</body>
</html>
